name: Build and Publish

# Program package publish workflow.
#
# Programs are published as SOURCE — no binary export. We still build the
# example project Intel + ARM to catch source errors before shipping the
# tarball.
#
# Detection contract: this workflow assumes lpm.type == "program" in the
# package's package.json. If you flip a repo from program to library,
# replace this workflow with the library `build-export-publish.yml`
# pattern instead.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. v3.0.0)'
        required: true

jobs:
  build-publish:
    runs-on: [AS6-runner]

    permissions:
      contents: read
      packages: write

    env:
      PROJECT:     example/AsProject/AsProject.apj
      PACKAGE_DIR: src/Ar/RevInfo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@loupeteam'

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $ver = $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
            $ver = "${{ inputs.version }}" -replace '^v', ''
          }
          if (-not $ver) {
            Write-Error "Could not determine version. Push a v*.*.* tag or supply the version input."
            exit 1
          }
          Write-Host "Publishing version: $ver"
          "version=$ver" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_OUTPUT

      - name: Verify program package
        shell: pwsh
        run: |
          $pkgPath = Join-Path "${{ env.PACKAGE_DIR }}" "package.json"
          if (-not (Test-Path $pkgPath)) {
            Write-Error "package.json not found at $pkgPath"
            exit 1
          }
          $pkg = Get-Content $pkgPath -Raw | ConvertFrom-Json
          if ($pkg.lpm.type -ne 'program') {
            Write-Error "Expected lpm.type == 'program' in $pkgPath, got '$($pkg.lpm.type)'. This workflow is for program packages only."
            exit 1
          }
          Write-Host "Confirmed program package: $($pkg.name)"

      - name: Find AS6 build executable
        uses: loupeteam/br-actions/find-as6-build@v1
        id: find-as

      - name: Build Intel
        uses: loupeteam/br-actions/build-as-project@v1
        with:
          exe-path: ${{ steps.find-as.outputs.exe-path }}
          project:  ${{ env.PROJECT }}
          config:   Intel

      - name: Build ARM
        uses: loupeteam/br-actions/build-as-project@v1
        with:
          exe-path: ${{ steps.find-as.outputs.exe-path }}
          project:  ${{ env.PROJECT }}
          config:   ARM

      - name: Set package version
        shell: pwsh
        run: |
          Push-Location "${{ env.PACKAGE_DIR }}"
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
          Pop-Location

      - name: Copy README into package
        shell: pwsh
        run: |
          if (Test-Path README.md) {
            Copy-Item -Path README.md -Destination "${{ env.PACKAGE_DIR }}/README.md" -Force
          }

      - name: Publish to GitHub Packages
        shell: pwsh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Push-Location "${{ env.PACKAGE_DIR }}"
          npm publish
          Pop-Location

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ steps.version.outputs.version }}
          path: ${{ env.PACKAGE_DIR }}/
          if-no-files-found: error

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BuildDiagnostics
          path: example/AsProject/Temp/BuildDiagnostics.log
          if-no-files-found: ignore
